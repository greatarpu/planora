<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planora-form</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>

    <style>
        table.table-forms {
            box-shadow: 0px 2px 2px #00000029;
            border: 1px solid #E2D2DB;
            border-radius: 3px;
            font-size: 16px;
        }

        table.table-forms thead {
            background: transparent linear-gradient(270deg, rgba(238, 130, 163, 0.25) 0%, rgba(255, 169, 83, 0.25) 100%) 0% 0% no-repeat padding-box;
            font-family: 'Lato' !important;
            font-weight: 700;
            font-size: var(--fs-sm);
            color: #6F003B;
        }

        table.table-forms thead th {
            background: transparent !important;
            font-family: 'Lato' !important;
            font-weight: 700;
            font-size: var(--fs-xs);
            color: #6F003B;
        }

        table.table-forms tbody td {
            font-family: 'Lato' !important;
            font-weight: 500;
            font-size: var(--fs-xs);
            color: #050505;
        }

        .action-col {
            text-align: center;
        }

        td.action-col a {
            margin: auto;
        }
    </style>
</head>

<body>
    <section class="blob-bg-body">
        <section class="header-sec">
            <div class="custom-container p-0">
                <div class="brand-sec">
                    <div class="container-fluid">
                        <div class="row align-items-center">
                            <div class="col-xl-3 col-lg-12 d-flex justify-content-between align-items-center">
                                <a class="brand" href="home.html">
                                    <img class="brand-img" src="./images/landing-page/logo.png">
                                    <p class="brand-txt">Planora.AI</p>
                                </a>

                                <button class="navbar-toggler d-xl-none border-0 p-0" type="button"
                                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                    <span class="navbar-toggler-icon">
                                        <img src="./images/Assets_Organiser_Personna/Header and Footer/toggler.svg"
                                            style="width: 30px;">
                                    </span>
                                </button>
                            </div>

                            <div class="col-xl-9">
                                <div class="collapse navbar-collapse d-xl-flex justify-content-end align-items-center"
                                    id="navbarNav">
                                    <div class="d-xl-none text-end w-100">
                                        <p class="welcome-txt">Welcome <span class="user-name">Ramesh, Rishi</span></p>
                                        <button type="button" class="btn-close btn-close-white"
                                            data-bs-toggle="collapse" data-bs-target="#navbarNav"></button>
                                    </div>

                                    <div class="global-nav-sec">
                                        <ul>
                                            <li><a class="global-nav-link" href="#"><img
                                                        src="./images/Assets_Organiser_Personna/Header and Footer/home.svg"
                                                        alt="">
                                                    <span>Home</span></a></li>
                                            <li><a class="global-nav-link" href="#"><img
                                                        src="./images/Assets_Organiser_Personna/Header and Footer/ticket.svg"
                                                        alt="">
                                                    <span>My Tickets</span></a></li>
                                            <li><a class="global-nav-link" href="#"><img
                                                        src="./images/Assets_Organiser_Personna/Header and Footer/help.svg"
                                                        alt="">
                                                    <span>Help</span></a></li>
                                            <li><a class="global-nav-link" href="#"><img
                                                        src="./images/Assets_Organiser_Personna/Header and Footer/notification_bell.svg"
                                                        alt="">
                                                    <span>Notification</span></a></li>
                                        </ul>
                                    </div>

                                    <div class="user-details-sec">

                                        <span class="user-icon-sec"><img class="user-icon"
                                                src="./images/Assets_Organiser_Personna/Header and Footer/profile.svg"></span>
                                        <span class="user-name">Samuvel, Arputharaj</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>


        <section class="navigation-sec">
            <div class="custom-container p-0">
                <div class="sec-nav-sec">
                    <div class="container-fluid">
                        <div class="row align-items-center">
                            <div class="col-xl-3 col-lg-12 d-flex align-items-center">
                                <a class="back-icon-link" href="home.html">
                                    <img class="back-icon"
                                        src="./images/Assets_Organiser_Personna/Form Setup/back.svg"></a>
                                <p class="page-name">Convergence 2026</p>


                                <button class="navbar-toggler d-xl-none border-0 p-0" type="button"
                                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                    <span class="navbar-toggler-icon">
                                        <img src="./images/Assets_Organiser_Personna/Header and Footer/toggler.svg" s
                                            tyle="width: 30px;">
                                    </span>
                                </button>
                            </div>

                            <div class="col-xl-9">
                                <div class="secondary-nav-wrapper" id="secondaryNav">
                                    <div class="custom-container">
                                        <ul class="secondary-nav-list">
                                            <li>
                                                <a href="#" class="nav-item">
                                                    <img class="default"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Dashboard inactive.svg"
                                                        alt="">
                                                    <img class="hover"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Dashboard active.svg"
                                                        alt="">
                                                    <span>Dashboard</span>
                                                </a>
                                            </li>
                                            <li>
                                                <a href="#" class="nav-item">
                                                    <img class="default"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Event info inactive.svg"
                                                        alt="">
                                                    <img class="hover"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Event info active.svg"
                                                        alt="">
                                                    <span>Event Information</span>
                                                </a>
                                            </li>
                                            <li class="active">
                                                <a href="#" class="nav-item">
                                                    <img class="default"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Form setup inactive.svg"
                                                        alt="">
                                                    <img class="hover"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Form setup active.svg"
                                                        alt="">
                                                    <span>Form Setup</span>
                                                </a>
                                            </li>
                                            <li>
                                                <a href="#" class="nav-item">
                                                    <img class="default"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Registration inactive.svg"
                                                        alt="">
                                                    <img class="hover"
                                                        src="./images/Assets_Organiser_Personna/Event section bar/Registration active.svg"
                                                        alt="">
                                                    <span>Registrations</span>
                                                </a>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="blur-box-sec">
            <div class="custom-container">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-sm-12">
                            <div class="blur-box">
                                <div class="blur-box-head">
                                    <div class="container-fluid">
                                        <div class="row align-items-center">
                                            <div class="col-sm-6">
                                                <p>Registration Form</p>
                                            </div>
                                            <div class="col-sm-6 d-flex justify-content-end">
                                                <a class="primary-btn create-new-form-btn">Send Form</a>
                                            </div>
                                        </div>
                                    </div>

                                </div>

                                <div class="blur-box-body">

                                    <div class="form-panel">
                                        <img class="form-cover-pic"
                                            src="./images/Assets_Organiser_Personna/Form Setup/">
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>



    </section>

    <section class="footer-sec">
        <div class="custom-container">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col-sm-6">
                        <p class="credits-txt">Powered by ECS Hyper Automation</p>
                    </div>
                    <div class="col-sm-6 text-end"><img
                            src="./images/Assets_Organiser_Personna/Header and Footer/footer-logo.svg"
                            class="footer-logo">
                    </div>
                </div>
            </div>
        </div>
    </section>

</html>
