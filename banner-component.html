<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planora Hero Animation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Segoe UI, sans-serif;
            background: #fff;
        }

        /* HERO */

        .hero-section {
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE8F0 100%);
            padding: 80px 20px;
        }

        /* Banner */

        .banner {
            width: 700px;
            height: 520px;
            margin: auto;
            position: relative;
            perspective: 1200px;
        }

        /* Layer = breathing */

        .layer {
            position: absolute;
            animation: breathe 6s ease-in-out infinite;
            transform-origin: center;
        }

        /* Inner = hover tilt */

        .inner {
            transition: transform .25s ease;
            transform-style: preserve-3d;
        }

        .layer img {
            width: 100%;
            display: block;
            pointer-events: none;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.15));
        }

        /* Positioning */

        .laptop {
            width: 420px;
            bottom: 40px;
            left: 140px;
            z-index: 1;
        }

        .megaphone {
            width: 170px;
            bottom: 70px;
            left: 20px;
            z-index: 2;
            animation-delay: 1s;
        }

        .pad {
            width: 160px;
            top: 40px;
            left: 60px;
            z-index: 3;
            animation-delay: 2s;
        }

        .phone {
            width: 140px;
            top: 10px;
            right: 30px;
            z-index: 4;
            animation-delay: 3s;
        }

        /* Breathing animation */

        @keyframes breathe {

            0% {
                transform: scale(1) translateY(0px);
            }

            50% {
                transform: scale(1.04) translateY(-8px);
            }

            100% {
                transform: scale(1) translateY(0px);
            }

        }
    </style>

</head>

<body>

    <section class="hero-section">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-lg-6">
                    <h1>Planora.AI</h1>
                    <p>Tell us what event you want — AI builds it for you</p>
                </div>

                <div class="col-lg-6">

                    <div class="banner">

                        <div class="layer laptop">
                            <div class="inner">
                                <img src="images/landing-page/laptop mockup.png">
                            </div>
                        </div>

                        <div class="layer megaphone">
                            <div class="inner">
                                <img src="images/landing-page/megaaphone.png">
                            </div>
                        </div>

                        <div class="layer pad">
                            <div class="inner">
                                <img src="images/landing-page/event.png">
                            </div>
                        </div>

                        <div class="layer phone">
                            <div class="inner">
                                <img src="images/landing-page/QR scan image.png">
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script>

        const layers = document.querySelectorAll(".layer");

        layers.forEach(layer => {

            const inner = layer.querySelector(".inner");

            layer.addEventListener("mousemove", (e) => {

                const rect = layer.getBoundingClientRect();

                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;

                inner.style.transform =
                    `scale(1.1) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            });

            layer.addEventListener("mouseleave", () => {

                inner.style.transform =
                    "scale(1) rotateX(0deg) rotateY(0deg)";

            });

        });

    </script>

</body>

</html>
